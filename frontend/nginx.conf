server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the FastAPI backend on the docker network.
    # location /api/ + trailing slash on proxy_pass strips the /api prefix,
    # so /api/reports -> http://report-service:8080/reports
    location /api/ {
        proxy_pass http://report-service:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
